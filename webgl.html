<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>WebGL 复杂图形测试</title>
<style>
  body{margin:0;background:#000;color:#fff;font-family:Arial;overflow:hidden;}
  #info{position:fixed;left:10px;top:10px;background:rgba(0,0,0,.5);padding:8px 12px;border-radius:6px;font-size:13px;z-index:10;}
  canvas{display:block;}
</style>
</head>
<body>
<div id="info">
  WebGL 测试 · FPS: <span id="fps">--</span> · 物体数: <span id="cnt">0</span>
  · <button onclick="addCubes(200)">+200</button>
  · <button onclick="addCubes(-200)">-200</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
let scene,camera,renderer,cubes=[];
function init(){
  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x000010, 50, 400);
  camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
  camera.position.z = 200;
  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  // 灯光
  scene.add(new THREE.AmbientLight(0x404040));
  const dl = new THREE.DirectionalLight(0xffffff, 1);
  dl.position.set(1,1,1);
  scene.add(dl);

  // 粒子点云
  const pg = new THREE.BufferGeometry();
  const pos = new Float32Array(10000*3);
  for(let i=0;i<pos.length;i++) pos[i]=(Math.random()-0.5)*600;
  pg.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const pm = new THREE.PointsMaterial({color:0x66ccff,size:1.2});
  scene.add(new THREE.Points(pg, pm));

  addCubes(500);

  addEventListener('resize', ()=>{
    camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
  animate();
}
function addCubes(n){
  if(n>0){
    const g = new THREE.BoxGeometry(4,4,4);
    for(let i=0;i<n;i++){
      const m = new THREE.MeshPhongMaterial({color:Math.random()*0xffffff});
      const c = new THREE.Mesh(g,m);
      c.position.set((Math.random()-0.5)*300,(Math.random()-0.5)*300,(Math.random()-0.5)*300);
      c.userData.spd = {x:Math.random()*0.05,y:Math.random()*0.05};
      scene.add(c); cubes.push(c);
    }
  }else{
    for(let i=0;i<-n && cubes.length;i++){
      const c = cubes.pop(); scene.remove(c);
      c.geometry.dispose(); c.material.dispose();
    }
  }
  document.getElementById('cnt').textContent = cubes.length;
}
let last=performance.now(),frames=0;
function animate(){
  requestAnimationFrame(animate);
  for(const c of cubes){ c.rotation.x+=c.userData.spd.x; c.rotation.y+=c.userData.spd.y; }
  scene.rotation.y += 0.001;
  renderer.render(scene,camera);
  frames++;
  const now=performance.now();
  if(now-last>=500){
    document.getElementById('fps').textContent = (frames*1000/(now-last)).toFixed(0);
    frames=0; last=now;
  }
}
init();
</script>
</body>
</html>
