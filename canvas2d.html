<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Canvas2D 高负载测试</title>
<style>
  body{margin:0;background:#101418;color:#fff;font-family:Arial;overflow:hidden;}
  #info{position:fixed;left:10px;top:10px;background:rgba(0,0,0,.5);padding:8px 12px;border-radius:6px;font-size:13px;z-index:10;}
  canvas{display:block;}
</style>
</head>
<body>
<div id="info">
  Canvas2D · FPS: <span id="fps">--</span> · 球数: <span id="cnt">0</span>
  · <button onclick="add(1000)">+1000</button>
  · <button onclick="add(-1000)">-1000</button>
  · <label><input type="checkbox" id="shadow" checked /> 阴影</label>
  · <label><input type="checkbox" id="grad" checked /> 渐变</label>
</div>
<canvas id="cv"></canvas>
<script>
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
function resize(){ cv.width=innerWidth*devicePixelRatio; cv.height=innerHeight*devicePixelRatio;
  cv.style.width=innerWidth+'px'; cv.style.height=innerHeight+'px';
  ctx.scale(devicePixelRatio,devicePixelRatio);
}
addEventListener('resize',resize); resize();

const balls=[];
function add(n){
  if(n>0){
    for(let i=0;i<n;i++){
      balls.push({
        x:Math.random()*innerWidth, y:Math.random()*innerHeight,
        vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4,
        r:4+Math.random()*8,
        c:`hsl(${Math.random()*360},80%,60%)`
      });
    }
  }else{
    balls.splice(0, Math.min(-n, balls.length));
  }
  document.getElementById('cnt').textContent = balls.length;
}
add(5000);

let last=performance.now(),frames=0;
function tick(){
  requestAnimationFrame(tick);
  ctx.clearRect(0,0,innerWidth,innerHeight);
  const sh=document.getElementById('shadow').checked;
  const gd=document.getElementById('grad').checked;
  if(sh){ ctx.shadowBlur=8; ctx.shadowColor='rgba(0,0,0,.5)'; } else ctx.shadowBlur=0;
  for(const b of balls){
    b.x+=b.vx; b.y+=b.vy;
    if(b.x<0||b.x>innerWidth) b.vx*=-1;
    if(b.y<0||b.y>innerHeight) b.vy*=-1;
    if(gd){
      const g=ctx.createRadialGradient(b.x,b.y,1,b.x,b.y,b.r);
      g.addColorStop(0,'#fff'); g.addColorStop(1,b.c);
      ctx.fillStyle=g;
    }else ctx.fillStyle=b.c;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
  }
  frames++;
  const now=performance.now();
  if(now-last>=500){
    document.getElementById('fps').textContent=(frames*1000/(now-last)).toFixed(0);
    frames=0; last=now;
  }
}
tick();
</script>
</body>
</html>
